<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>复习 · 划词翻译卡片</title>
  <script src="theme.js"></script>
  <style>
    /* Shares the settings page's design system. Theme: prefers-color-scheme for
       `auto`; explicit [data-theme] (theme.js, from the 主题 setting) overrides. */

    @font-face { font-family:'Fraunces'; font-style:normal; font-weight:300; font-display:swap; src:url('fonts/fraunces-300.woff2') format('woff2'); }
    @font-face { font-family:'Fraunces'; font-style:normal; font-weight:400; font-display:swap; src:url('fonts/fraunces-400.woff2') format('woff2'); }
    @font-face { font-family:'Fraunces'; font-style:italic; font-weight:400; font-display:swap; src:url('fonts/fraunces-400-italic.woff2') format('woff2'); }

    :root {
      color-scheme: light dark;
      --serif: 'Fraunces', ui-serif, Georgia, 'Times New Roman', serif;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, Helvetica, Arial, sans-serif;
      --bg: #f4f4f6;
      --glow-1: rgba(99, 102, 241, 0.14);
      --glow-2: rgba(99, 102, 241, 0.07);
      --surface: rgba(255, 255, 255, 0.72);
      --surface-solid: #ffffff;
      --tray: rgba(0, 0, 0, 0.025);
      --fg: #18181b; --muted: #71717a; --faint: #a1a1aa;
      --border: rgba(0, 0, 0, 0.08); --divider: rgba(0, 0, 0, 0.06); --hover: rgba(0, 0, 0, 0.045);
      --accent: #6366f1; --accent-hi: #818cf8; --accent-lo: #4f46e5; --on-accent: #ffffff;
      --ring: rgba(99, 102, 241, 0.32); --ok: #10b981; --err: #ef4444;
      --shadow: 0 0 0 .5px rgba(0,0,0,.04), 0 2px 6px rgba(0,0,0,.05), 0 22px 56px rgba(0,0,0,.12);
      --glass-edge: inset 0 1px 0 rgba(255,255,255,.55);
      --spring: cubic-bezier(.16, 1, .3, 1);
    }
    :root[data-theme="light"] { color-scheme: light; }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0b0b0e; --glow-1: rgba(129,140,248,0.16); --glow-2: rgba(99,102,241,0.09);
      --surface: rgba(26,26,30,0.66); --surface-solid: #1a1a1e; --tray: rgba(255,255,255,0.035);
      --fg: #f4f4f5; --muted: #a1a1aa; --faint: #71717a;
      --border: rgba(255,255,255,0.10); --divider: rgba(255,255,255,0.07); --hover: rgba(255,255,255,0.06);
      --accent: #a5b4fc; --accent-hi: #c7d2fe; --accent-lo: #818cf8; --on-accent: #0b0b0e;
      --ring: rgba(165,180,252,0.38); --ok: #34d399; --err: #f87171;
      --shadow: 0 0 0 .5px rgba(255,255,255,.05), 0 2px 8px rgba(0,0,0,.4), 0 24px 64px rgba(0,0,0,.6);
      --glass-edge: inset 0 1px 0 rgba(255,255,255,.07);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        color-scheme: dark;
        --bg: #0b0b0e; --glow-1: rgba(129,140,248,0.16); --glow-2: rgba(99,102,241,0.09);
        --surface: rgba(26,26,30,0.66); --surface-solid: #1a1a1e; --tray: rgba(255,255,255,0.035);
        --fg: #f4f4f5; --muted: #a1a1aa; --faint: #71717a;
        --border: rgba(255,255,255,0.10); --divider: rgba(255,255,255,0.07); --hover: rgba(255,255,255,0.06);
        --accent: #a5b4fc; --accent-hi: #c7d2fe; --accent-lo: #818cf8; --on-accent: #0b0b0e;
        --ring: rgba(165,180,252,0.38); --ok: #34d399; --err: #f87171;
        --shadow: 0 0 0 .5px rgba(255,255,255,.05), 0 2px 8px rgba(0,0,0,.4), 0 24px 64px rgba(0,0,0,.6);
        --glass-edge: inset 0 1px 0 rgba(255,255,255,.07);
      }
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; padding: 40px 18px 64px; color: var(--fg);
      font-family: var(--sans); font-size: 14px; line-height: 1.6;
      background:
        radial-gradient(56vw 48vw at 50% -16%, var(--glow-1), transparent 62%),
        radial-gradient(40vw 40vw at 104% 112%, var(--glow-2), transparent 55%),
        var(--bg);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .035;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='180' height='180' filter='url(%23n)'/></svg>");
    }
    :root[data-theme="dark"] body::before { opacity: .05; }
    @media (prefers-color-scheme: dark) { :root:not([data-theme]) body::before { opacity: .05; } }
    ::selection { background: rgba(99, 102, 241, 0.22); }

    .wrap { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; }
    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .back {
      color: var(--muted); text-decoration: none; font-size: 13.5px;
      padding: 6px 12px; margin: 0 -12px; border-radius: 9px; transition: color .16s, background .16s;
    }
    .back:hover { color: var(--fg); background: var(--hover); }
    .progress { color: var(--faint); font-size: 12.5px; font-variant-numeric: tabular-nums; }

    .card {
      position: relative; border-radius: 22px; padding: 48px 32px; min-height: 260px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 15px;
      background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow);
      -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%);
      animation: rise .4s var(--spring) both;
    }
    .card::after { content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none; box-shadow: var(--glass-edge); }
    .card:not(.flip) { cursor: pointer; }
    .card:not(.flip):hover { border-color: color-mix(in srgb, var(--accent) 24%, var(--border)); }

    .word { font-size: 32px; font-weight: 700; letter-spacing: -.02em; word-break: break-word; line-height: 1.2; }
    .hint {
      color: var(--faint); font-size: 12.5px; margin-top: 2px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .hint::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: .7; }
    .divider { width: 56px; border-top: 1px solid var(--divider); margin: 2px 0; }
    .answer { font-size: 22px; font-weight: 500; word-break: break-word; }
    .note { color: var(--fg); font-size: 13.5px; background: var(--tray); border: 1px solid var(--divider); padding: 6px 12px; border-radius: 10px; word-break: break-word; }
    .ctx { color: var(--muted); font-size: 13px; font-style: italic; font-family: var(--serif); word-break: break-word; max-width: 42ch; }
    .meta { color: var(--faint); font-size: 12px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .pill { font-size: 11px; font-weight: 500; color: var(--muted); background: var(--hover); border-radius: 6px; padding: 2px 8px; }

    .actions { display: flex; gap: 11px; margin-top: 20px; justify-content: center; }
    .actions button { flex: 1; max-width: 200px; }
    button {
      font-family: var(--sans); font-size: 14.5px; font-weight: 600; line-height: 1;
      padding: 13px 18px; border: 1px solid transparent; border-radius: 12px; cursor: pointer;
      color: var(--on-accent); background: linear-gradient(180deg, var(--accent-hi), var(--accent));
      box-shadow: 0 1px 2px rgba(79,70,229,.34), inset 0 1px 0 rgba(255,255,255,.26);
      transition: transform .14s var(--spring), box-shadow .18s, background .16s, border-color .16s;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0) scale(.98); }
    .ghost { color: var(--fg); background: var(--tray); border-color: var(--border); box-shadow: none; font-weight: 500; }
    .ghost:hover { background: var(--hover); border-color: color-mix(in srgb, var(--accent) 26%, var(--border)); }
    .good { color: var(--on-accent); background: linear-gradient(180deg, var(--accent-hi), var(--accent)); }
    .again {
      color: var(--err); background: color-mix(in srgb, var(--err) 12%, var(--surface-solid));
      border-color: color-mix(in srgb, var(--err) 38%, var(--border)); box-shadow: none;
    }
    .again:hover { background: color-mix(in srgb, var(--err) 18%, var(--surface-solid)); }

    .done {
      position: relative; text-align: center; padding: 56px 24px; border-radius: 22px;
      background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow);
      -webkit-backdrop-filter: blur(24px) saturate(180%); backdrop-filter: blur(24px) saturate(180%);
      animation: rise .4s var(--spring) both;
    }
    .done .big { font-size: 46px; margin-bottom: 10px; }
    .done .msg { color: var(--muted); margin-bottom: 24px; max-width: 38ch; margin-left: auto; margin-right: auto; }

    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="vocab.html">← 生词本</a>
      <span class="progress" id="progress"></span>
    </div>
    <div id="stage"></div>
  </div>

  <script src="data.js"></script>
  <script src="vocab.js"></script>
  <script src="review-app.js"></script>
</body>
</html>
