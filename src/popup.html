<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>划词翻译卡片</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff; --fg: #1f2937; --muted: #6b7280;
      --border: #e5e7eb; --accent: #6366f1; --chip: #f3f4f6;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#1f2330; --fg:#e7e9ee; --muted:#9aa0ac; --border:#343a4a; --accent:#818cf8; --chip:#2a2f3d; }
    }
    * { box-sizing: border-box; }
    body {
      width: 280px; margin: 0; padding: 14px;
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
    }
    .title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .badge { width: 22px; height: 22px; border-radius: 6px; background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center; font-size: 13px; }
    .row { margin-bottom: 10px; }
    label { display: block; color: var(--muted); margin-bottom: 4px; font-size: 12px; }
    select {
      width: 100%; padding: 6px 8px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--chip); color: var(--fg);
      font-size: 13px;
    }
    .chk { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; font-size: 13px; }
    .chk input { width: 15px; height: 15px; accent-color: var(--accent); margin: 0; }
    .dim { color: var(--muted); font-size: 11px; }
    .hint { color: var(--muted); font-size: 11px; line-height: 1.5; margin-top: 10px; }
    kbd { background: var(--chip); border: 1px solid var(--border); border-radius: 4px; padding: 0 5px; font-size: 11px; }
    button.more {
      width: 100%; margin-top: 12px; padding: 8px;
      border: none; border-radius: 8px; cursor: pointer;
      background: var(--accent); color: #fff; font-size: 13px; font-weight: 500;
    }
    button.more:hover { opacity: .92; }
  </style>
</head>
<body>
  <div class="title"><span class="badge">译</span>划词翻译卡片</div>

  <div class="row">
    <label for="targetLang">目标语言</label>
    <select id="targetLang"></select>
  </div>

  <div class="row">
    <label for="triggerMode">触发方式</label>
    <select id="triggerMode">
      <option value="button">选中后显示翻译按钮</option>
      <option value="auto">选中后立即翻译</option>
      <option value="off">仅用快捷键 / 右键</option>
    </select>
  </div>

  <div class="row">
    <label for="provider">翻译引擎</label>
    <select id="provider">
      <option value="bing">微软翻译（免费，国内可用）</option>
      <option value="google">Google（免费，需可访问谷歌）</option>
      <option value="deepl">DeepL（需 API Key）</option>
      <option value="openai">大模型 / 自定义接口</option>
    </select>
  </div>

  <div class="row">
    <label class="chk"><input type="checkbox" id="lensEnabled" /> 悬停阅读透镜 <span class="dim">划过段落即显示译文</span></label>
    <label class="chk"><input type="checkbox" id="contextAware" /> 上下文翻译 <span class="dim">更准，需大模型</span></label>
  </div>

  <button class="more" id="openOptions">更多设置 / 填写 API Key</button>

  <div class="hint">
    选中网页文字即可翻译；快捷键 <kbd>Alt</kbd>+<kbd>T</kbd>，或右键「翻译选中文字」。
    卡片常驻显示，按住顶部可拖动，<kbd>Esc</kbd> 或 ✕ 关闭。
  </div>

  <script src="data.js"></script>
  <script src="popup.js"></script>
</body>
</html>
