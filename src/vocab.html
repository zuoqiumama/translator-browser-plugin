<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生词本 · 划词翻译卡片</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg:#f7f7fb; --card:#ffffff; --fg:#1f2937; --muted:#6b7280;
      --border:#e5e7eb; --accent:#6366f1; --chip:#f3f4f6; --ok:#16a34a; --err:#ef4444;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#15171f; --card:#1f2330; --fg:#e7e9ee; --muted:#9aa0ac; --border:#343a4a; --accent:#818cf8; --chip:#2a2f3d; }
    }
    * { box-sizing: border-box; }
    body { margin:0; padding:32px 16px; background:var(--bg); color:var(--fg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      font-size:14px; line-height:1.6; }
    .wrap { max-width:760px; margin:0 auto; }
    h1 { font-size:20px; display:flex; align-items:center; gap:10px; margin:0 0 4px; }
    .badge { width:28px; height:28px; border-radius:8px; background:var(--accent); color:#fff;
      display:flex; align-items:center; justify-content:center; font-size:15px; }
    .sub { color:var(--muted); margin:0 0 20px; }
    .toolbar { display:flex; gap:8px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
    .search { flex:1; min-width:160px; padding:9px 12px; border-radius:10px; border:1px solid var(--border);
      background:var(--card); color:var(--fg); font-size:14px; }
    .sort { padding:9px 10px; border-radius:10px; border:1px solid var(--border);
      background:var(--card); color:var(--fg); font-size:13px; }
    button { padding:8px 13px; border:none; border-radius:9px; cursor:pointer;
      background:var(--accent); color:#fff; font-size:13px; font-weight:500; }
    button.ghost { background:var(--chip); color:var(--fg); border:1px solid var(--border); }
    button:hover { opacity:.92; }
    .count { color:var(--muted); font-size:13px; margin-left:auto; white-space:nowrap; }
    .list { display:flex; flex-direction:column; gap:10px; }
    .item { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px 16px;
      display:flex; gap:12px; align-items:flex-start; }
    .item .main { flex:1; min-width:0; }
    .item .src { font-size:15px; font-weight:600; word-break:break-word; }
    .item .tr { margin-top:3px; word-break:break-word; }
    .item .note { color:var(--muted); font-size:12.5px; margin-top:5px; padding:3px 9px;
      background:var(--chip); border-radius:7px; display:inline-block; cursor:text; word-break:break-word; }
    .note-input { margin-top:5px; width:100%; padding:6px 9px; border-radius:8px;
      border:1px solid var(--accent); background:var(--card); color:var(--fg); font-size:13px; }
    .item .meta { color:var(--muted); font-size:12px; margin-top:6px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .item .meta a { color:var(--accent); text-decoration:none; max-width:300px; overflow:hidden;
      text-overflow:ellipsis; white-space:nowrap; }
    .item .meta a:hover { text-decoration:underline; }
    .pill { background:var(--chip); border-radius:6px; padding:1px 7px; }
    .row-actions { display:flex; gap:6px; flex:none; }
    .ico-btn { background:transparent; color:var(--muted); border:1px solid var(--border);
      width:30px; height:30px; padding:0; border-radius:8px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; }
    .ico-btn svg { width:15px; height:15px; }
    .ico-btn:hover { color:var(--accent); border-color:var(--accent); opacity:1; }
    .ico-btn.del:hover { color:var(--err); border-color:var(--err); }
    .empty { text-align:center; color:var(--muted); padding:64px 16px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1><span class="badge">词</span>生词本</h1>
    <p class="sub">收藏的词句保存在本地浏览器，可搜索、排序、加备注、朗读，或导入导出。</p>

    <div class="toolbar">
      <button id="reviewBtn" type="button">复习</button>
      <input class="search" id="search" type="search" placeholder="搜索原文或译文…" />
      <select class="sort" id="sort" title="排序">
        <option value="new">最近收藏</option>
        <option value="old">最早收藏</option>
        <option value="az">字母 A–Z</option>
        <option value="lang">按语言</option>
      </select>
      <button class="ghost" id="importBtn" type="button">导入</button>
      <button class="ghost" id="exportJson" type="button">备份 JSON</button>
      <button class="ghost" id="exportCsv" type="button">导出 CSV</button>
      <button class="ghost" id="exportAnki" type="button">导出 Anki</button>
      <button class="ghost" id="clearAll" type="button">清空</button>
      <span class="count" id="count"></span>
      <input type="file" id="importFile" accept=".json,application/json" hidden />
    </div>

    <div class="list" id="list"></div>
  </div>

  <script src="data.js"></script>
  <script src="vocab.js"></script>
  <script src="vocab-app.js"></script>
</body>
</html>
